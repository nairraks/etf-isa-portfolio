title: DIY ETF ISA Portfolio Guide
author: nairraks
copyright: "2025"
logo: ""
exclude_patterns:
  - README.md
  - CLAUDE.md
  - "archive/**"
  - ".claude/**"
  - ".venv/**"
  - ".pytest_cache/**"
  - "tests/**"
  - "etf_utils/**"
  - "data/**"
  - "_build/**"
  - ".git/**"
  - ".github/**"
  - ".env*"

# Off during refactoring — switch to "cache" once pipeline is stable
execute:
  execute_notebooks: "off"
  timeout: 300

# Information about where the book exists on the web
repository:
  url: https://github.com/nairraks/etf-isa-portfolio
  branch: main

html:
  baseurl: /etf-isa-portfolio
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: true
  analytics:
    google_analytics_id: G-0Z7Y15K61E

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist

sphinx:
  recursive_update: true
  config:
    html_theme_options:
      navigation_with_keys: true
    html_static_path:
      - _static
    html_css_files:
      - custom.css
