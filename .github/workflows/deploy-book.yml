name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build the book
        run: |
          uv run jupyter-book build . --verbose
          touch ./_build/html/.nojekyll

      - name: Verify build output
        run: |
          echo "=== Files in _build/html ==="
          ls -la ./_build/html/
          echo "=== Notebook pages ==="
          ls -la ./_build/html/notebooks/ || echo "NO NOTEBOOKS DIR"
          echo "=== Sidebar check ==="
          grep -c 'toctree-l1' ./_build/html/index.html || echo "NO TOCTREE ENTRIES"
          echo "=== .nojekyll ==="
          ls -la ./_build/html/.nojekyll
          echo "=== Static assets ==="
          ls ./_build/html/_static/styles/ || echo "NO STYLES DIR"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
